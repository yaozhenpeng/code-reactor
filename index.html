<!DOCTYPE html>
<html>
<head>
    <title>My Test Page</title>
</head>
<body>
    <h1>NowPayments Test Page</h1>
    <p>This page is for testing crypto payments.</p>

    <!-- NowPayments 支付按钮 -->
    <div id="nowpayments-button"></div>

    <script src="https://www.nowpayments.io/widget/nowpayments.js"></script>
    <script>
        // 初始化支付按钮
        NowPaymentsWidget.init({
            publicKey: "313a4039-6db9-48eb-868b-9b155e66c8b8", // 使用你默认的 Public Key
            widget: {
                selector: "#nowpayments-button", // 按钮显示位置
                amount: 0.001,                  // BTC 支付金额
                currency: "BTC",                // 支付币种 BTC
                description: "Payment for Code Reactor Test Page" // 支付说明
            }
        });
    </script>
</body>
</html>
